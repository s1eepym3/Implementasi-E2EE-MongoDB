<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrivateCloud E2EE - Secure Storage</title>
  
  <!-- Modern UI Assets -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/modern.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .search-container { position: relative; width: 100%; max-width: 300px; }
    .search-container i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .search-input { padding-left: 40px !important; }
    .file-icon { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; background: rgba(59, 130, 246, 0.1); color: var(--primary); }
  </style>
</head>
<body>

  <script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "login.html";
  </script>

  <div class="container d-flex justify-content-center">
    <div class="glass-card">
      
      <!-- Header -->
      <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
          <h2 class="fw-bold mb-0">PrivateCloud</h2>
          <p class="text-muted small">End-to-End Encrypted Storage</p>
        </div>
        <div class="d-flex gap-2">
          <button id="themeToggle" class="btn btn-light btn-modern">
            <i data-lucide="moon"></i>
          </button>
          <button id="logoutBtn" class="btn btn-outline-danger btn-modern">
            <i data-lucide="log-out"></i>
          </button>
        </div>
      </div>

      <!-- Main Content Area -->
      <div id="uploadView">
        <div class="upload-zone" id="dropZone">
          <i data-lucide="shield-check"></i>
          <h4 class="fw-bold">Tarik file ke sini</h4>
          <p class="text-muted">Atau klik untuk memilih file dari komputer</p>
          <input type="file" id="fileInput" hidden>
        </div>

        <div class="progress-modern mb-4" id="progressContainer" style="display:none;">
          <div id="progressBar" class="progress-bar-modern" style="width:0%"></div>
        </div>

        <div class="d-flex gap-3">
          <button id="listButton" class="btn btn-light btn-modern w-100">
            <i data-lucide="folder"></i> Lihat Koleksi
          </button>
        </div>
      </div>

      <div id="fileListView" style="display:none;">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
          <h4 class="fw-bold mb-0">Koleksi File Saya</h4>
          
          <div class="d-flex gap-2 align-items-center">
            <div class="search-container">
              <i data-lucide="search" style="width: 18px;"></i>
              <input type="text" id="searchInput" class="form-control form-control-sm search-input" placeholder="Cari file...">
            </div>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table-modern">
            <thead>
              <tr>
                <th style="width: 50px;">Tipe</th>
                <th>Nama File</th>
                <th>Ukuran</th>
                <th class="text-end">Aksi</th>
              </tr>
            </thead>
            <tbody id="fileTableBody"></tbody>
          </table>
        </div>

        <!-- Storage Info -->
        <div class="storage-widget">
          <div class="d-flex justify-content-between mb-2">
            <span class="small fw-bold">Kapasitas Storage</span>
            <span id="storageText" class="small text-muted">0 / 512 MB</span>
          </div>
          <div class="progress-modern">
            <div id="storageBar" class="progress-bar-modern" style="width:0%"></div>
          </div>
        </div>

        <button id="backToUpload" class="btn btn-light btn-modern mt-4">
          <i data-lucide="arrow-left"></i> Kembali Upload
        </button>
      </div>

    </div>
  </div>

  <div id="toast" class="toast-modern"></div>

  <!-- Scripts -->
  <script src="js/crypto-helper.js"></script>
  <script>
    const API_URL = window.location.origin;
    const tokenHeader = { "Authorization": "Bearer " + localStorage.getItem("token") };
    
    let allFiles = []; // Cache untuk pencarian

    // UI Elements
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const uploadView = document.getElementById("uploadView");
    const fileListView = document.getElementById("fileListView");
    const fileTableBody = document.getElementById("fileTableBody");
    const searchInput = document.getElementById("searchInput");
    
    lucide.createIcons();

    // Navigation
    document.getElementById("listButton").addEventListener("click", () => {
      uploadView.style.display = "none";
      fileListView.style.display = "block";
      loadFileList();
    });

    document.getElementById("backToUpload").addEventListener("click", () => {
      fileListView.style.display = "none";
      uploadView.style.display = "block";
    });

    // Search Logic
    searchInput.addEventListener("input", () => {
      const query = searchInput.value.toLowerCase();
      const filtered = allFiles.filter(f => f.filename.toLowerCase().includes(query));
      renderFiles(filtered);
    });

    // Drag & Drop
    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      if (e.dataTransfer.files.length) handleUpload(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener("change", () => {
      if (fileInput.files.length) handleUpload(fileInput.files[0]);
    });

    async function handleUpload(file) {
      showToast("🔐 Mengenkripsi " + file.name);
      const progressContainer = document.getElementById("progressContainer");
      const progressBar = document.getElementById("progressBar");

      try {
        const key = await generateEncryptionKey();
        const { encryptedContent, iv } = await encryptFile(file, key);
        const hexKey = await exportKey(key);

        const formData = new FormData();
        formData.append("iv", iv);
        formData.append("key", hexKey);
        formData.append("file", new Blob([encryptedContent]), file.name);

        const xhr = new XMLHttpRequest();
        xhr.open("POST", `${API_URL}/upload`, true);
        xhr.setRequestHeader("Authorization", "Bearer " + localStorage.getItem("token"));

        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            progressContainer.style.display = "block";
            const percent = (e.loaded / e.total) * 100;
            progressBar.style.width = percent + "%";
          }
        };

        xhr.onload = () => {
          progressContainer.style.display = "none";
          if (xhr.status === 200) {
            showToast("✅ Berhasil Diunggah!");
            loadFileList();
            uploadView.style.display = "none";
            fileListView.style.display = "block";
          } else showToast("❌ Gagal upload.");
        };
        xhr.send(formData);
      } catch (err) {
        showToast("❌ Error Enkripsi");
      }
    }

    async function loadFileList() {
      try {
        const res = await fetch(`${API_URL}/files?scope=user`, { headers: tokenHeader });
        allFiles = await res.json();
        renderFiles(allFiles);
        updateStorage();
      } catch (err) { console.error(err); }
    }

    function getFileIcon(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      if (['jpg', 'jpeg', 'png', 'gif', 'svg'].includes(ext)) return 'image';
      if (['mp4', 'mkv', 'avi', 'mov'].includes(ext)) return 'video';
      if (['mp3', 'wav', 'flac', 'm4a'].includes(ext)) return 'music';
      if (['pdf', 'doc', 'docx', 'txt', 'pdf'].includes(ext)) return 'file-text';
      if (['zip', 'rar', '7z'].includes(ext)) return 'archive';
      return 'file';
    }

    function renderFiles(files) {
      fileTableBody.innerHTML = "";
      files.forEach(file => {
        const size = (file.length / 1024).toFixed(1) + " KB";
        const iconName = getFileIcon(file.filename);
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>
            <div class="file-icon"><i data-lucide="${iconName}" style="width: 20px;"></i></div>
          </td>
          <td class="fw-medium">${file.filename}</td>
          <td class="text-muted small">${size}</td>
          <td>
            <div class="d-flex justify-content-end gap-2">
              <button class="btn btn-sm btn-light btn-action" onclick="downloadAndDecrypt('${file._id}', '${file.filename}', '${file.metadata?.key}', '${file.metadata?.iv}')">
                <i data-lucide="download"></i>
              </button>
              <button class="btn btn-sm btn-light btn-action text-danger" onclick="deleteFile('${file._id}')">
                <i data-lucide="trash-2"></i>
              </button>
            </div>
          </td>
        `;
        fileTableBody.appendChild(row);
      });
      lucide.createIcons();
    }

    async function downloadAndDecrypt(id, filename, hexKey, hexIv) {
      showToast("📥 Mendekripsi...");
      try {
        const res = await fetch(`${API_URL}/download/${id}?token=${localStorage.getItem("token")}`);
        const encryptedData = await res.arrayBuffer();
        const decryptedData = await decryptFile(encryptedData, hexKey, hexIv);

        const blob = new Blob([decryptedData]);
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        showToast("✅ Berhasil!");
      } catch (err) { showToast("❌ Gagal Dekripsi"); }
    }

    async function deleteFile(id) {
      if (!confirm("Hapus file ini?")) return;
      await fetch(`${API_URL}/delete/${id}`, { method: "DELETE", headers: tokenHeader });
      loadFileList();
    }

    async function updateStorage() {
      const res = await fetch(`${API_URL}/storage`, { headers: tokenHeader });
      const data = await res.json();
      document.getElementById("storageText").innerText = `${data.usedMB} / ${data.maxCapacityMB} MB`;
      const percent = (data.usedMB / data.maxCapacityMB) * 100;
      document.getElementById("storageBar").style.width = percent + "%";
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.innerText = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 3000);
    }

    // Theme Toggle
    document.getElementById("themeToggle").addEventListener("click", () => {
      document.body.classList.toggle("dark-mode");
      const isDark = document.body.classList.contains("dark-mode");
      localStorage.setItem("theme", isDark ? "dark" : "light");
      document.getElementById("themeToggle").innerHTML = isDark ? '<i data-lucide="sun"></i>' : '<i data-lucide="moon"></i>';
      lucide.createIcons();
    });

    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark-mode");
      document.getElementById("themeToggle").innerHTML = '<i data-lucide="sun"></i>';
      lucide.createIcons();
    }
    
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("token");
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
